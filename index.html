<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Má Kuchařka</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0c;
    --surface: #1a1814;
    --card: #201e1a;
    --accent: #e8a838;
    --accent2: #c45c2a;
    --text: #f0ebe3;
    --muted: #8a8278;
    --border: #2e2b26;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HERO */
  .hero {
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 2rem;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 50%, rgba(232,168,56,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 50% 60% at 80% 30%, rgba(196,92,42,0.07) 0%, transparent 60%);
    pointer-events: none;
  }

  .hero-badge {
    display: inline-block;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    padding: 0.4rem 1.2rem;
    border-radius: 100px;
    margin-bottom: 2rem;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.2s forwards;
  }

  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3.5rem, 10vw, 8rem);
    font-weight: 700;
    line-height: 0.95;
    letter-spacing: -0.02em;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.4s forwards;
  }

  .hero h1 em {
    font-style: italic;
    color: var(--accent);
  }

  .hero-sub {
    margin-top: 1.5rem;
    color: var(--muted);
    font-size: 1rem;
    letter-spacing: 0.05em;
    max-width: 400px;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.6s forwards;
  }

  .hero-scroll {
    position: absolute;
    bottom: 2.5rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    color: var(--muted);
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 0.8s ease 1s forwards;
  }

  .scroll-line {
    width: 1px;
    height: 40px;
    background: linear-gradient(to bottom, var(--accent), transparent);
    animation: scrollLine 2s ease-in-out infinite;
  }

  @keyframes scrollLine {
    0%, 100% { opacity: 0.3; transform: scaleY(1); }
    50% { opacity: 1; transform: scaleY(1.2); }
  }

  /* DECORATIVE CIRCLES */
  .deco {
    position: absolute;
    border-radius: 50%;
    border: 1px solid var(--border);
    pointer-events: none;
  }
  .deco-1 { width: 400px; height: 400px; top: -100px; right: -100px; opacity: 0.4; }
  .deco-2 { width: 200px; height: 200px; bottom: 100px; left: 50px; opacity: 0.2; border-color: var(--accent2); }
  .deco-3 { width: 600px; height: 600px; bottom: -200px; right: -150px; opacity: 0.15; }

  /* SECTION */
  section {
    max-width: 1200px;
    margin: 0 auto;
    padding: 6rem 2rem;
  }

  .section-label {
    display: flex;
    align-items: center;
    gap: 1rem;
    color: var(--accent);
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-bottom: 3rem;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* CATEGORIES */
  .categories {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
    margin-bottom: 3rem;
  }

  .cat-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 0.5rem 1.25rem;
    border-radius: 100px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.25s ease;
  }

  .cat-btn:hover, .cat-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #0f0e0c;
    font-weight: 500;
  }

  /* GRID */
  .recipe-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1.5rem;
  }

  /* CARD */
  .recipe-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards;
  }

  .recipe-card:hover {
    transform: translateY(-6px);
    border-color: var(--accent);
    box-shadow: 0 20px 60px rgba(232,168,56,0.1);
  }

  .card-img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    display: block;
    background: var(--surface);
    position: relative;
    overflow: hidden;
  }

  .card-emoji {
    width: 100%;
    height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 5rem;
    background: linear-gradient(135deg, var(--surface), var(--card));
  }

  .card-body {
    padding: 1.5rem;
  }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 0.75rem;
  }

  .card-category {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
  }

  .card-time {
    font-size: 0.75rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 0.5rem;
  }

  .card-desc {
    font-size: 0.85rem;
    color: var(--muted);
    line-height: 1.6;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.5rem;
    border-top: 1px solid var(--border);
  }

  .difficulty {
    display: flex;
    gap: 4px;
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--border);
  }
  .dot.filled { background: var(--accent); }

  .btn-detail {
    font-size: 0.75rem;
    color: var(--accent);
    text-decoration: none;
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
    gap: 0.3rem;
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: gap 0.2s ease;
  }
  .btn-detail:hover { gap: 0.6rem; }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10,9,8,0.9);
    backdrop-filter: blur(8px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    max-width: 700px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    transform: translateY(30px) scale(0.97);
    transition: transform 0.3s ease;
  }

  .modal-overlay.open .modal { transform: translateY(0) scale(1); }

  .modal-header {
    padding: 2rem 2rem 1rem;
    position: relative;
  }

  .modal-close {
    position: absolute;
    top: 1.5rem;
    right: 1.5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    width: 36px; height: 36px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.1rem;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .modal-close:hover { background: var(--border); }

  .modal-emoji { font-size: 3.5rem; margin-bottom: 1rem; }

  .modal-category {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.5rem;
  }

  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 700;
    line-height: 1.15;
    margin-bottom: 0.75rem;
  }

  .modal-stats {
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
    padding: 1.25rem 2rem;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    margin-bottom: 0;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 0.2rem;
  }

  .stat-label {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .stat-value {
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--accent);
  }

  .modal-body { padding: 1.5rem 2rem 2rem; }

  .modal-section-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 1rem;
    margin-top: 1.5rem;
    color: var(--text);
  }

  .ingredients-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .ingredients-list li {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    font-size: 0.9rem;
    color: var(--muted);
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }

  .ingredients-list li::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }

  .steps-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .steps-list li {
    display: flex;
    gap: 1rem;
    font-size: 0.9rem;
    color: var(--muted);
    line-height: 1.7;
  }

  .step-num {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--border);
    line-height: 1;
    flex-shrink: 0;
    width: 2rem;
    text-align: right;
  }

  /* ADD RECIPE FORM */
  .add-section {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 6rem 2rem;
  }

  .add-inner {
    max-width: 700px;
    margin: 0 auto;
  }

  .add-title {
    font-family: 'Playfair Display', serif;
    font-size: 2.5rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
  }

  .add-sub { color: var(--muted); margin-bottom: 2.5rem; font-size: 0.9rem; }

  .form-group {
    margin-bottom: 1.25rem;
  }

  label {
    display: block;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }

  input, textarea, select {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    padding: 0.8rem 1rem;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus, textarea:focus, select:focus { border-color: var(--accent); }
  textarea { min-height: 100px; resize: vertical; }
  select option { background: var(--card); }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }

  .btn-add {
    background: var(--accent);
    color: #0f0e0c;
    border: none;
    border-radius: 10px;
    padding: 0.9rem 2rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    width: 100%;
    margin-top: 0.5rem;
    transition: background 0.2s, transform 0.2s;
  }

  .btn-add:hover { background: #f0b840; transform: translateY(-2px); }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 2rem;
    border-top: 1px solid var(--border);
    color: var(--muted);
    font-size: 0.8rem;
  }

  /* ANIMATIONS */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .recipe-card:nth-child(1) { animation-delay: 0.1s; }
  .recipe-card:nth-child(2) { animation-delay: 0.2s; }
  .recipe-card:nth-child(3) { animation-delay: 0.3s; }
  .recipe-card:nth-child(4) { animation-delay: 0.4s; }
  .recipe-card:nth-child(5) { animation-delay: 0.5s; }
  .recipe-card:nth-child(6) { animation-delay: 0.6s; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 600px) {
    .form-row { grid-template-columns: 1fr; }
    .modal-title { font-size: 1.5rem; }
  }

  .hero-photo-wrap {
    position: relative;
    margin-top: 3rem;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.8s forwards;
  }

  .hero-photo {
    width: 260px;
    border-radius: 20px;
    border: 2px solid var(--accent);
    box-shadow: 0 0 60px rgba(232,168,56,0.25), 0 20px 60px rgba(0,0,0,0.6);
    display: block;
    object-fit: cover;
    object-position: center top;
    height: 300px;
    background: #000;
  }

  .hero-photo-label {
    position: absolute;
    bottom: -14px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--accent);
    color: #0f0e0c;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    padding: 0.35rem 1rem;
    border-radius: 100px;
    white-space: nowrap;
  }

</style>
</head>

      desc: "Krémové italské rizoto s kuřecím masem a parmazánem. Bohaté a sytící.",

      ingredients: ["300 g rýže arborio","400 g kuřecích prsou","1 cibule","2 stroužky česneku","1 dl bílého vína","1 l kuřecího vývaru","50 g parmazánu","2 lžíce másla","olivový olej, sůl, pepř"],
      steps: ["Nakrájej kuře na kostičky, osoL, opepři a opeč na olivovém oleji. Odlož.","Na stejné pánvi orestuj nakrájenou cibuli a česnek.","Přisyp rýži a míchej 2 minuty, dokud nebude průsvitná.","Zalij vínem a míchej, dokud se nevstřebá.","Postupně přilévej horký vývar po naběračkách, stále míchej.","Po 20 minutách přimíchej kuře, máslo a strouhaný parmazán.","Dochut a podávej ihned."]
    },
    {
      id: 4,
      name: "Čokoládový dort",
      category: "dezerty",
      emoji: "🎂",
      time: "60 min",
      difficulty: 3,
      desc: "Nadýchaný čokoládový dort s krémovou ganache. Na každou oslavu.",
      portions: "8–10 porcí",
      ingredients: ["200 g hořké čokolády","150 g másla","200 g cukru","4 vejce","150 g hladké mouky","2 lžičky prášku do pečiva","Pro ganache: 200 ml smetany, 150 g čokolády"],
      steps: ["Předehřej troubu na 175 °C. Vymaž formu.","Rozpusť čokoládu s máslem ve vodní lázni.","Vmíchej cukr, poté vejce jedno po druhém.","Přisyp mouku s práškem do pečiva a promíchej.","Přelij do formy a peč 30–35 minut.","Na ganache zahřej smetanu a přilij k nalámané čokoládě. Nech ztáhnout.","Vychladlý dort potři ganache."]
    },
    {
      id: 5,
      name: "Avokádový toast",
      category: "snídaně",
      emoji: "🥑",
      time: "10 min",
      difficulty: 1,
      desc: "Rychlá a zdravá snídaně plná dobrých tuků. S vejcem na hniličku dokonalé.",
      portions: "1 porce",
      ingredients: ["2 plátky tmavého chleba","1 zralé avokádo","šťáva z ½ citrónu","sůl, pepř, chilli vločky","volitelně: vejce na hniličku, ředkvičky"],
      steps: ["Opeč plátky chleba v tostovači.","Avokádo rozmačkej vidličkou, přidej citrónovou šťávu, sůl a pepř.","Rozetři avokádo na toast.","Posyp chilli vločkami. Přidej vejce nebo ředkvičky."]
    },
    {
      id: 6,

      emoji: "🧄",

      difficulty: 1,
      desc: "Tradiční česká česnečka s brambory a sýrem. Na zahřátí i po oslavě.",
      portions: "4 porce",
      ingredients: ["8–10 stroužků česneku","3 brambory","1 l masového vývaru","100 g sýru Eidam","1 lžíce másla","sůl, kmín, majoránka","opečený chléb na podávání"],
      steps: ["Brambory oloupej a nakrájej na kostičky.","Vař je v masovém vývaru do měkka (cca 15 minut).","Orestuj nadrobno nakrájený česnek na másle.","Přidej česnek k polévce, dochut solí, kmínem a majoránkou.","Podávej s opečeným chlebem a strouhaným sýrem."]
    }
  ];

  function renderCards(filter = 'vše') {
    const grid = document.getElementById('recipeGrid');
    grid.innerHTML = '';
    const filtered = filter === 'vše' ? recipes : recipes.filter(r => r.category === filter);
    filtered.forEach((r, i) => {
      const diff = Array.from({length: 3}, (_, j) =>
        `<div class="dot ${j < r.difficulty ? 'filled' : ''}"></div>`).join('');
      grid.innerHTML += `
        <div class="recipe-card" style="animation-delay:${i * 0.1}s" onclick="openModal(${r.id})">
          <div class="card-emoji">${r.emoji}</div>
          <div class="card-body">
            <div class="card-meta">
              <span class="card-category">${r.category}</span>
              <span class="card-time">⏱ ${r.time}</span>
            </div>
            <div class="card-title">${r.name}</div>
            <div class="card-desc">${r.desc}</div>
          </div>
          <div class="card-footer">
            <div class="difficulty">${diff}</div>
            <button class="btn-detail">Detail →</button>
          </div>
        </div>`;
    });
  }

  function filterRecipes(cat, btn) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderCards(cat);
  }

  function openModal(id) {
    const r = recipes.find(x => x.id === id);
    document.getElementById('m-emoji').textContent = r.emoji;
    document.getElementById('m-category').textContent = r.category;
    document.getElementById('m-title').textContent = r.name;
    document.getElementById('m-stats').innerHTML = `
      <div class="stat"><div class="stat-label">Čas</div><div class="stat-value">${r.time}</div></div>
      <div class="stat"><div class="stat-label">Porce</div><div class="stat-value">${r.portions}</div></div>
      <div class="stat"><div class="stat-label">Obtížnost</div><div class="stat-value">${['','Snadné','Střední','Náročné'][r.difficulty]}</div></div>`;
    document.getElementById('m-ingredients').innerHTML = r.ingredients.map(i => `<li>${i}</li>`).join('');
    document.getElementById('m-steps').innerHTML = r.steps.map((s, i) =>
      `<li><span class="step-num">0${i+1}</span><span>${s}</span></li>`).join('');
    document.getElementById('modalOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModalBtn();
  }

  function closeModalBtn() {
    document.getElementById('modalOverlay').classList.remove('open');
    document.body.style.overflow = '';
  }

  function addRecipe() {
    const name = document.getElementById('f-name').value.trim();
    const ingredients = document.getElementById('f-ingredients').value.trim();
    const steps = document.getElementById('f-steps').value.trim();
    if (!name || !ingredients || !steps) {
      alert('Vyplň prosím název, ingredience a postup.');
      return;
    }
    const newRecipe = {
      id: Date.now(),
      name,
      category: document.getElementById('f-category').value,
      emoji: document.getElementById('f-emoji').value || '🍽️',
      time: document.getElementById('f-time').value || '?',
      difficulty: parseInt(document.getElementById('f-difficulty').value),
      desc: document.getElementById('f-desc').value || '',
      portions: document.getElementById('f-portions').value || '?',
      ingredients: ingredients.split('\n').filter(l => l.trim()),
      steps: steps.split('\n').filter(l => l.trim())
    };
    recipes.unshift(newRecipe);
    renderCards('vše');
    document.querySelectorAll('.cat-btn').forEach((b,i) => b.classList.toggle('active', i===0));
    ['f-name','f-emoji','f-time','f-desc','f-ingredients','f-steps','f-portions'].forEach(id =>
      document.getElementById(id).value = '');
    window.scrollTo({ top: document.querySelector('section').offsetTop - 80, behavior: 'smooth' });
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalBtn(); });

  renderCards();
</script>
</body>
</html>
